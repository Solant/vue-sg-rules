id: lodash-tree-shaking
message: Importing the full lodash bundle prevents tree-shaking
severity: warning
note: Use direct imports (e.g. `lodash/cloneDeep`) or `lodash-es` named imports instead
url: https://lodash.com/per-method-packages
language: tsx
rule:
  kind: import_statement
  has:
    field: source
    regex: "^.lodash.$"
